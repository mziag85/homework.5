<!-- შექმენით მოტივაციური პოსტის საიტი. 
 დიზაინი შეგიძლიათ თქვენი გემოვნებით გააფორმოთ (ინსპირაციისთვის შეხედეთ ნიმუშის ფოტოს), 
 თუმცა გვერდს აუცილებლად უნდა ჰქონდეს შემდეგი მახასიათებლები:

1 მთავარი სათაურისთვის (h1) გამოიყენეთ Regular Libre Baskerville ფონტი Google Fonts-იდან: Libre Baskerville.
  https://fonts.google.com/specimen/Libre+Baskerville -  შეგიძლიათ გამოტოვოთ ეს ნაწილი. ლექციაზე ვისწავლით. 

2 გვერდზე ტექსტის ფერი უნდა იყოს თეთრი, ხოლო გვერდის ფონი — შავი.

3 დაამატეთ თქვენი ფოტო assets/images საქაღალდეში. ფოტოს უნდა ჰქონდეს 5px-იანი თეთრი ჩარჩო (border).

4 ტექსტი უნდა იყოს ცენტრში განლაგებული (center aligned).

5 შექმენით div კონტეინერი, რომელიც მოიცავს h1, p და img ელემენტებს. დაარეგულირეთ დაშორებები (margins) ისე, რომ ფოტო და ტექსტი გვერდის ცენტრში მოხვდეს.

მინიშნება: div-ს ჰორიზონტალურად გააცენტრებთ, თუ მისცემთ width: 50% და margin-left: 25%.

მინიშნება: ფოტოს მიეცით width: 100%, რათა მან სრულად შეავსოს div კონტეინერი.

6 წაიკითხეთ text-transform თვისების შესახებ MDN-ის დოკუმენტაციაში და გამოიყენეთ ის, რათა h1 სათაური სრულად დიდი ასოებით (uppercase) დაწეროთ: MDN text-transform.
https://developer.mozilla.org/en-US/docs/Web/CSS/text-transform
 -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>დავალება დეინერისი</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      @import url ("https://fonts.google.com/specimen/Libre+Baskerville");
      h1 {
        font-family:
          "Libre Baskerville",
          Regular Libre Baskerville;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="./assets/images/daenerys.jpeg" />
      <h1 class="text">THAT SPECIAL MOMENT</h1>
      <h2 class="text">when you find the perfect avocado at the market</h2>
      <p class="text">great</p>
    </div>
  </body>
</html>
