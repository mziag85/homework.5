<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Properties</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap"
      rel="stylesheet" />
    <style>
      body {
        background-color: cornflowerblue;
        color: white;
        font-size: 18px;
      }
      p {
        color: coral;
      }
      .size {
        font-size: 2rem;
      }
      .weight {
        font-weight: 900;
      }

      .align {
        text-align: right;
      }
      .family {
        font-family: "Caveat", cursive;
      }

      html {
        font-size: 30px;
      }
      /* Don't change the CSS above, add Your CSS below */
    </style>
  </head>

  <body>
    <h1>Important CSS Properties</h1>
    <p>Color</p>
    <p class="size">Font Size</p>
    <p class="weight">Font Weight</p>
    <p class="family">Font Family</p>
    <p class="align">Text Align</p>

    <!-- შეცვალეთ ტექსტის — <p>Color</p> — ფერი და გახადეთ ის "coral".

შეცვალეთ ტექსტის — <p>Font Size</p> — ზომა ისე, რომ ის იყოს ძირეული ფონტის ზომაზე (root font size) ორჯერ (2X) დიდი.

შეცვალეთ ტექსტის — <p>Font Weight</p> — სისქე და მიანიჭეთ მას მნიშვნელობა 900.

შეცვალეთ ტექსტის — <p>Font Family</p> — ფონტის სტილი (ოჯახი): გამოიყენეთ Google Font-ის ფონტი Caveat, რეგულარული (400) სისქით.

ლინკი: https://fonts.google.com/specimen/Caveat

ტექსტი — <p>Text Align</p> — განათავსეთ მარჯვენა მხარეს (right align).

ძირეული ელემენტის (html element) ფონტის ზომა შეცვალეთ და გახადეთ 30px. -->
  </body>
</html>
