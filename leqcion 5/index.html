<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Flag Project</title>
    <style>
      body {
        background-color: rgb(39, 36, 36);
      }
      .flag {
        background-color: red;
        width: 900px;
        height: 600px;
        position: relative;
        border: 5px solid white;
      }

      .flag > p {
        text-align: center;
        color: white;
        font-size: 80px;
        letter-spacing: 1px;
        font-weight: 600;
        margin-top: 0;
      }
      .flag > div {
        background-color: rgb(19, 19, 100);
        width: 900px;
        height: 300px;
        position: absolute;
        top: 25%;
      }
      .flag > div > div {
        background-color: white;
        width: 200px;
        height: 200px;
        position: relative;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .flag > div > div > p {
        color: black;
        font-size: 70px;
        letter-spacing: 1px;
        font-weight: 60;
        position: absolute;
        left: 50%;
        top: 15%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
    </style>
  </head>

  <!-- მნიშვნელოვანი! HTML-ში არაფერი შეცვალო.

მინიშნება 1: დროშა არის 900px სიგანით და 600px სიმაღლით,
ხოლო წრე არის 200px სიგანით და 200px სიმაღლით.
 -->

  <body>
    <div class="flag">
      <p>The Flag</p>
      <div>
        <div>
          <p>of Laos</p>
        </div>
      </div>
    </div>
  </body>
</html>
