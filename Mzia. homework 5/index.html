<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figrma "Order Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <img class="foto" src="./fotos/foto.png" alt="main foto" />
      <h1>Order Summary</h1>
      <p class="card__text">
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </p>
      <div class="greybox">
        <img class="music" src="./fotos/music.svg" alt="music" > </img> 
        <span class="ann">Annual Plan</span>
          <span class="price">$59.99/year</span>
         <p class="change">Change</p>
      </div>
      <div class="bluebox">
        <p>Proceed to Payment</p>
      </div>
      <p class="cancel">Cancel Order</p>
      </div>
    </div>
  </body>
</html>
