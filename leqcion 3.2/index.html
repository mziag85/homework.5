<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Box Model</title>
    <link rel="stylesheet" href="./style.css" />
    <style></style>
  </head>

  <body>
    <!-- შექმენით 3 ყუთი (Box) div ელემენტის გამოყენებით.

განუსაზღვრეთ მათ ზომები: სიმაღლე 200px და სიგანე 200px.

თითოეული ყუთისთვის შეარჩიეთ განსხვავებული ფონი (Background colors). (მაგალითად: cadetblue, gold და indianred).

პირველ div-ში ჩასვით აბზაცი <p> და დაამატეთ "Lorem ipsum"-ის ტექსტი.

პირველ div-ს დაუმატეთ 20px შიდა დაშორება (padding) ყველა მხრიდან და 10px შავი ჩარჩო (border).

გაასწორეთ <p> ელემენტის სტილი ისე, რომ მოაშოროთ ყველა გარე დაშორება (margin).

მინიშნება: გამოიყენეთ Chrome-ის CSS Inspector-ი შესამოწმებლად.

მეორე div-ს დაუმატეთ 20px ჩარჩო (border) ზემოდან და ქვემოდან, ხოლო 10px ჩარჩო მარცხნიდან და მარჯვნიდან.

მესამე div-ს დაუმატეთ 10px ჩარჩო (border) ყველა მხრიდან.

დააყენეთ div-ების გარე დაშორებები (margin) ისე, რომ ყუთების კუთხეები ერთმანეთს ეხებოდეს (როგორც ნიმუშის სურათზეა). -->
    <div class="box1">
      <p>
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Unde ipsa, id
        excepturi natus nam maiores, minus perferendis voluptatibus expedita
        totam ab nulla a nisi sapiente? Dolorum enim quos repellendus autem?
      </p>
    </div>
    <div class="box2"></div>
    <div class="box3"></div>
  
</html>
